<script>
  (function() {
    var DESIGN_WIDTH = 1200;
    function applyScale() {
      var screenW = window.innerWidth;
      var style = document.getElementById('__mobile_scale');
      if (!style) {
        style = document.createElement('style');
        style.id = '__mobile_scale';
        document.head.appendChild(style);
      }
      if (screenW < DESIGN_WIDTH) {
        var scale = screenW / DESIGN_WIDTH;
        style.textContent = [
          'html {',
          '  transform: scale(' + scale + ');',
          '  transform-origin: top left;',
          '  width: ' + DESIGN_WIDTH + 'px;',
          '  overflow-x: hidden;',
          '}',
          'body {',
          '  overflow-x: hidden;',
          '  min-height: ' + Math.ceil(100 / scale) + 'vh;',
          '}',
          /* Wrapper on the iframe side clips the overflow */
          'html, body { max-width: 100%; }'
        ].join('\n');
        // Also clip at the document level via inline style
        document.documentElement.style.overflow = 'hidden';
        document.documentElement.style.maxWidth = screenW + 'px';
      } else {
        style.textContent = '';
        document.documentElement.style.overflow = '';
        document.documentElement.style.maxWidth = '';
      }
    }
    applyScale();
    window.addEventListener('resize', applyScale);
  })();
</script>
