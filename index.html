<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Critter Crimes</title>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>

<body style="margin:0; background:black; overflow:hidden;">

<div id="game-container"></div>

<script>
const config = {
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,
  parent: "game-container",
  backgroundColor: "#000000",
  scene: {
    preload,
    create
  }
};

function preload() {
  // cache-bust prevents stale GitHub Pages asset issues
  this.load.image('map', 'assets/map.png?v=' + Date.now());
}

function create() {

  const map = this.add.image(
    window.innerWidth / 2,
    window.innerHeight / 2,
    'map'
  );

  // Get screen and image ratios
  const scaleX = window.innerWidth / map.width;
  const scaleY = window.innerHeight / map.height;

  // IMPORTANT CHANGE: use MIN instead of MAX
  const scale = Math.min(scaleX, scaleY);

  map.setScale(scale);

  this.add.text(20, 20, "CRITTER CRIMES LIVE", {
    fontSize: "20px",
    color: "#ffffff"
  });

}

new Phaser.Game(config);
</script>

</body>
</html>
