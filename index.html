<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #e8dcc4;
    overflow-x: hidden;
  }
  body {
    font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

<script>
  // Set viewport so the 1200px page scales down to fit the device screen width
  // with no sideways scrolling. Must run before page renders.
  (function() {
    var DESIGN_WIDTH = 1200;
    var screenW = screen.width;
    // Use the smaller of screen.width and window.innerWidth
    if (window.innerWidth) screenW = Math.min(screenW, window.innerWidth);
    var scale = Math.min(1, screenW / DESIGN_WIDTH);
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=' + DESIGN_WIDTH + ', initial-scale=' + scale.toFixed(4) + ', maximum-scale=' + scale.toFixed(4) + ', user-scalable=no';
    document.head.appendChild(meta);
  })();
</script>
