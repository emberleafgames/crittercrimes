<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Critter Crimes</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>

<body style="margin:0; background:black; overflow:hidden;">
<div id="game-container"></div>

<script>

const config = {
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,
  parent: "game-container",
  backgroundColor: "#000000",
  scene: {
    preload,
    create
  }
};

new Phaser.Game(config);

function preload() {
  this.load.image('map', 'assets/map.png');
  this.load.image('goose', 'assets/goose.png');
  this.load.image('dog', 'assets/dog.png');
}

function create() {

  const map = this.add.image(
    this.cameras.main.centerX,
    this.cameras.main.centerY,
    'map'
  );

  const scaleX = this.cameras.main.width / map.width;
  const scaleY = this.cameras.main.height / map.height;
  const scale = Math.min(scaleX, scaleY);
  const goose = this.add.image(
  this.cameras.main.centerX - 100,
  this.cameras.main.centerY,
  'goose'
).setScale(0.4);

const dog = this.add.image(
  this.cameras.main.centerX + 100,
  this.cameras.main.centerY,
  'dog'
).setScale(0.4);
  map.setScale(scale);

  // UI layer (fixed to screen)
  this.add.text(20, 20, "CRITTER CRIMES", {
    fontSize: "24px",
    color: "#ffffff"
  }).setScrollFactor(0);

}

</script>

</body>
</html>
