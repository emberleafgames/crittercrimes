<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Critter Crimes — Landing Page · Ember Leaf Games</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Special+Elite&family=DM+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: #f0eee9;
    font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  /* Make external links inside artboards non-navigable for the canvas preview */
  .artboard-page a { cursor: pointer; }

  /* Tweak: center the Forage section's food / resource boxes */
  body.cc-center-forage .cc-forage-stack {
    margin-left: auto !important;
    margin-right: auto !important;
  }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#1a1612">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#1a1612"/>
    <g transform="translate(600 400)">
      <circle r="220" fill="none" stroke="#d4a437" stroke-width="6"/>
      <circle r="200" fill="none" stroke="#d4a437" stroke-width="2"/>
      <text x="0" y="-10" text-anchor="middle" font-family="Georgia, serif" font-weight="900" font-size="120" fill="#e8dcc4">CC</text>
      <text x="0" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="34" letter-spacing="6" fill="#d4a437">CRITTER CRIMES</text>
      <text x="0" y="130" text-anchor="middle" font-family="monospace" font-size="18" letter-spacing="4" fill="#a52a2a">// NYPD-K9 EVIDENCE</text>
    </g>
  </svg>
</template>

<!-- Email signup config — paste your Google Apps Script web app URL here.
     Setup guide in SIGNUP_SETUP.md. With no URL, submissions go to localStorage. -->
<script>window.SIGNUP_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbw6W4rP37vb3hGlhk5mKKldUXJANpowdOTwaGmGc4XBe-5RsdRsl_vAnycFZUZ4Eit7/exec';</script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared-data.jsx"></script>
<script type="text/babel" src="signup.jsx"></script>
<script type="text/babel" src="direction-a.jsx"></script>
<script type="text/babel" src="direction-b.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const ARTBOARD_W = 1200;
  const ARTBOARD_H = 8000;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "centerForage": true
  }/*EDITMODE-END*/;

  function TweaksController() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    React.useEffect(() => {
      document.body.classList.toggle('cc-center-forage', !!t.centerForage);
    }, [t.centerForage]);
    return (
      <TweaksPanel title="Tweaks">
        <TweakSection label="Layout" />
        <TweakToggle
          label="Center Forage boxes"
          value={t.centerForage}
          onChange={(v) => setTweak('centerForage', v)}
        />
      </TweaksPanel>
    );
  }

  function App() {
    return (
      <React.Fragment>
        <DesignCanvas>
        <DCSection
          id="landing"
          title="Critter Crimes — Landing Page"
          subtitle="Two directions for a new page on emberleafgames.com · click expand to view fullscreen"
        >
          <DCArtboard
            id="rap-sheet"
            label="A · The Rap Sheet — pulp wanted-poster"
            width={ARTBOARD_W}
            height={ARTBOARD_H}
          >
            <div className="artboard-page" data-screen-label="A · The Rap Sheet">
              <DirectionRapSheet />
            </div>
          </DCArtboard>
          <DCArtboard
            id="burrow-blvd"
            label="B · Burrow Boulevard — cozy noir editorial"
            width={ARTBOARD_W}
            height={ARTBOARD_H}
          >
            <div className="artboard-page" data-screen-label="B · Burrow Boulevard">
              <DirectionBurrowBlvd />
            </div>
          </DCArtboard>
        </DCSection>
        </DesignCanvas>
        <TweaksController />
      </React.Fragment>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
